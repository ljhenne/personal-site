<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading...</title>
    <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="grid-container">
        <div class="card image-card">
            <img id="portrait" alt="Portrait">
        </div>
        
        <div class="card title-card">
            <h1 id="site-name"></h1>
        </div>

        <div class="card bio-card">
            <p id="site-bio"></p>
        </div>

        <div class="card links-card">
            <a id="link-linkedin" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn">
                <i class="fa-brands fa-linkedin-in"></i>
            </a>
            <a id="link-medium" target="_blank" rel="noopener noreferrer" aria-label="Medium">
                <i class="fa-brands fa-medium"></i>
            </a>
            <a id="link-devto" target="_blank" rel="noopener noreferrer" aria-label="Dev.to">
                <i class="fa-brands fa-dev"></i>
            </a>
            <a id="link-github" target="_blank" rel="noopener noreferrer" aria-label="GitHub">
                <i class="fa-brands fa-github"></i>
            </a>
        </div>
    </main>

    <script src="config.js"></script>
    <script src="main.js"></script>
</body>
</html>
